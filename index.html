<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Reels Preview — Генератор превью из видео</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-logo">Video <span>Reels Preview</span></div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" id="btn-undo" disabled>↩ Отменить</button>
      <button class="btn btn-secondary btn-sm" id="btn-redo" disabled>↪ Повторить</button>
      <button class="btn btn-primary btn-sm" id="btn-export">⬇ Экспорт</button>
    </div>
  </header>

  <main class="app">

    <!-- LEFT PANEL -->
    <aside class="panel-left" id="panel-left">

      <div class="panel-section">
        <div class="panel-title">Источник</div>

        <div class="source-tabs">
          <button class="tab-btn active" data-src="auto">🔍 Авто</button>
          <button class="tab-btn" data-src="youtube">▶ YouTube</button>
          <button class="tab-btn" data-src="rutube">▶ Rutube</button>
          <button class="tab-btn" data-src="file">▶ Файл</button>
        </div>

        <div class="input-group active" id="src-auto">
          <div class="source-input-row">
            <input type="text" id="source-url" placeholder="Вставьте ссылку...">
            <button class="btn btn-primary btn-sm" id="btn-load">Загрузить</button>
          </div>
        </div>

        <div class="input-group" id="src-file">
          <div class="drop-zone" id="dropzone">
            <p>Перетащите видео или нажмите для выбора</p>
            <p class="hint">MP4, WebM, MOV...</p>
            <input type="file" id="file-input" accept="video/*">
          </div>
        </div>

        <div id="video-controls">
          <span class="time-display" id="time-display">0:00 / 0:00</span>
          <input type="range" id="time-slider" min="0" max="100" value="0" step="0.1">
          <select id="fmt">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG 90%</option>
            <option value="webp">WebP</option>
          </select>
          <button class="btn btn-primary btn-sm" id="btn-capture">📸 Снять кадр</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Инструменты</div>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="select">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
            Выделение
          </button>
          <button class="tool-btn" data-tool="text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
            Текст
          </button>
          <button class="tool-btn" data-tool="rect">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            Прямоугольник
          </button>
          <button class="tool-btn" data-tool="circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
            Круг
          </button>
          <button class="tool-btn" data-tool="arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19L19 5M19 5v10M19 5H9"/></svg>
            Стрелка
          </button>
          <button class="tool-btn" data-tool="line">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
            Линия
          </button>
        </div>
      </div>

      <div class="panel-section" id="props-panel">
        <div class="panel-title">Свойства</div>
        <div id="props-content"></div>
      </div>

      <div class="panel-section" id="filters-panel">
        <div class="panel-title">Фильтры</div>
        <div id="filters-content"></div>
        <button class="btn btn-secondary btn-sm" id="btn-reset-filters" style="margin-top:8px;width:100%">Сбросить фильтры</button>
      </div>

      <div class="panel-section">
        <div class="panel-title">Пресеты</div>
        <select id="preset-select" style="width:100%">
          <option value="shorts">YouTube Shorts 9:16</option>
          <option value="square">Instagram 1:1</option>
          <option value="youtube">YouTube 16:9</option>
          <option value="custom">Свой размер</option>
        </select>
        <div class="custom-size-inputs" id="custom-size" style="display:none">
          <input type="number" id="custom-w" placeholder="Ш" min="1">
          <span>×</span>
          <input type="number" id="custom-h" placeholder="В" min="1">
          <button class="btn btn-secondary btn-sm" id="btn-apply-size">OK</button>
        </div>
      </div>

    </aside>

    <!-- CENTER -->
    <section class="canvas-area">
      <div id="video-wrapper">
        <video id="player" controls crossorigin="anonymous"></video>
      </div>
      <div id="canvas-container">
        <canvas id="editor-canvas"></canvas>
        <div class="zoom-badge" id="zoom-badge">100%</div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="panel-right" id="panel-right">

      <div class="panel-section">
        <div class="panel-title">Слои</div>
        <div class="layer-actions">
          <button class="btn btn-secondary btn-sm" id="btn-add-layer">+ Добавить</button>
          <button class="btn btn-secondary btn-sm" id="btn-dup-layer">📋 Дубль</button>
          <button class="btn btn-danger btn-sm" id="btn-del-layer">🗑 Удалить</button>
        </div>
        <div id="layer-list"></div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Шаблоны</div>
        <div class="template-row">
          <select id="template-select">
            <option value="">— нет —</option>
          </select>
          <button class="btn btn-secondary btn-sm" id="btn-save-template">💾 Сохранить</button>
          <button class="btn btn-danger btn-sm" id="btn-del-template">🗑 Удалить</button>
        </div>
      </div>

    </aside>

  </main>

  <!-- OVERLAYS -->
  <div id="toasts"></div>

  <div id="preview-overlay">
    <button class="preview-close" id="preview-close">✕</button>
    <img id="preview-img" alt="Предпросмотр">
    <span id="preview-info"></span>
  </div>

  <nav class="mobile-bottom-bar" id="mobile-bottom-bar">
    <button class="tab-btn" data-panel="tools">🔧 Инструменты</button>
    <button class="tab-btn" data-panel="props">⚙ Свойства</button>
    <button class="tab-btn" data-panel="layers">📑 Слои</button>
    <button class="tab-btn" data-panel="filters">🎨 Фильтры</button>
    <button class="tab-btn" data-panel="more">⋯ Ещё</button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
